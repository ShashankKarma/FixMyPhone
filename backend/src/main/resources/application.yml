server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: fixmyphone-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:fixmyphone;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
            required: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:false}

# JWT Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3b7a1e5f8c6b2d4e7a9f0c1b3d5e7f8a2c4b6d8e0f1a3c5b7d9e1f2a} # 256-bit key
    accessTokenExpirationMs: ${JWT_ACCESS_EXPIRATION:3600000} # 1 hour
    refreshTokenExpirationMs: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days
  seeder:
    admin:
      email: ${SEEDER_ADMIN_EMAIL:admin@example.com}
      password: ${SEEDER_ADMIN_PASSWORD:AdminPassword123!}
    owner:
      email: ${SEEDER_OWNER_EMAIL:owner@example.com}
      password: ${SEEDER_OWNER_PASSWORD:OwnerPassword123!}
    shop:
      name: ${SEEDER_SHOP_NAME:Fixit Pro}
      email: ${SEEDER_SHOP_EMAIL:info@example.com}
      phone: ${SEEDER_SHOP_PHONE:1234567890}
      address: ${SEEDER_SHOP_ADDRESS:Shop Address}

# Razorpay Configuration
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_mockkey123}
    secret: ${RAZORPAY_KEY_SECRET:mocksecret1234567890abcdef}

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:mock-cloud}
  api-key: ${CLOUDINARY_API_KEY:mock-key}
  api-secret: ${CLOUDINARY_API_SECRET:mock-secret}

# Logging Configuration
logging:
  level:
    root: INFO
    com.fixmyphone.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
